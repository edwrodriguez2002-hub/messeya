name: messeya
description: Una aplicación de chat segura y resiliente con soporte para redes mesh locales.
publish_to: "none"

version: 1.7.8+21

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^5.5.0
  firebase_auth: ^5.3.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  file_picker: ^8.1.7
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  http: ^1.4.0
  in_app_purchase: ^3.2.3
  intl: ^0.20.2
  path: ^1.9.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  local_auth: ^3.0.1
  video_player: ^2.11.1
  record: ^6.2.0
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  connectivity_plus: ^7.0.0
  sqflite: ^2.4.2
  nearby_connections: ^4.3.0
  uuid: ^4.5.3
  permission_handler: ^12.0.1
  location: ^8.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1
  open_filex: ^4.7.0
  scrollable_positioned_list: ^0.3.8
  image_cropper: ^9.1.0
  video_trimmer: ^5.0.0
  flutter_local_notifications: ^17.2.4
  flutter_webrtc: ^1.3.1
  share_plus: ^10.1.4
  cryptography: ^2.5.0
  flutter_secure_storage: ^9.2.2
  flutter_background_service: ^5.0.10
  flutter_app_badger: ^1.5.0
  stream_chat_flutter_core: ^9.23.0
  onesignal_flutter: ^5.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 23
